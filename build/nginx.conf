server {
    listen 9080 default_server;
    server_name _;

    # 隐藏 OpenResty 版本号
    server_tokens off;
    # 伪装 Server 头（headers-more 模块，OpenResty 自带）
    more_set_headers 'Server: nginx';
    # 自定义 404 响应体，不暴露服务器信息
    error_page 404 = @err404;

    location @err404 {
        internal;
        default_type text/plain;
        return 404 "Not Found";
    }

    location / {
        access_by_lua_block {
            local otp = require "resty.otp"
            -- 写死的测试密钥（Base32），后续改为环境变量
            local totp = otp.totp_init("JBSWY3DPEHPK3PXP")

            local code = ngx.var.uri:match("^/(%d%d%d%d%d%d)$")

            if code then
                local now = ngx.time()
                -- 检查当前窗口 ±1（容差 90 秒）
                for _, off in ipairs({0, -1, 1}) do
                    if code == totp:calc_token(now + off * 30) then
                        ngx.header["Set-Cookie"] =
                            "auth_token=1; Path=/; HttpOnly; Max-Age=10800"
                        ngx.redirect("/")
                        return
                    end
                end
            end

            if ngx.var.cookie_auth_token then
                return
            end

            ngx.exit(404)
        }

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # 必须用 $http_host 而非 $host
        # $host 会丢掉端口号，导致 code-server 的 origin 校验失败：
        #   浏览器 Origin: http://localhost:34567 → "localhost:34567"
        #   $host 转发的 Host: localhost（无端口）
        #   "localhost" ≠ "localhost:34567" → WebSocket 被拒绝 (1006)
        # $http_host 保留完整 Host 头（含端口），匹配通过
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # WebSocket 长连接需要超长超时，默认 60s 会导致连接被断开
        proxy_read_timeout 3600s;
    }
}
